[www]
user = www-data
group = www-data

; Use Unix socket instead of TCP - more reliable in Docker
listen = /var/run/php/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0666

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5

; Pass all env vars to PHP-FPM workers (needed for Laravel)
clear_env = no

; Logging
php_flag[display_errors] = off
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
